spring:
  datasource:
    url: jdbc:sqlite:./pinpoint.db
    driver-class-name: org.sqlite.JDBC
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.community.dialect.SQLiteDialect
        format_sql: false
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 9090

pinpoint:
  metadata:
    request-timeout-ms: 7000
